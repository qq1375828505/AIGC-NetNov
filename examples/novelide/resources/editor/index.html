<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写作编辑器</title>
<meta http-equiv="refresh" content="0;url=../webapp/editor.html">
<style>
:root {
  --bg: #0d1117;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --border: #30363d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.redirect-card {
  text-align: center;
  padding: 40px;
}
.redirect-card h1 {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 12px;
}
.redirect-card p {
  color: var(--text-dim);
  margin-bottom: 20px;
}
.redirect-card a {
  color: var(--accent);
  text-decoration: none;
  padding: 8px 24px;
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: border-color 0.2s;
}
.redirect-card a:hover {
  border-color: var(--accent);
}
</style>
</head>
<body>
<div class="redirect-card">
  <h1>写作编辑器</h1>
  <p>正在跳转至编辑器...</p>
  <a href="../webapp/editor.html">手动打开编辑器</a>
</div>
</body>
</html>
