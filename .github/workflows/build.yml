name: Build AIGC-NetNov

on:
  push:
    branches: [master, main, feature/*]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Download prebuilt resources
        run: |
          # 从 Google Drive 或其他存储下载预编译资源
          # 这里需要配置 secrets 存放下载链接
          mkdir -p app/src/main/assets/models
          mkdir -p app/src/main/assets/subpack
          mkdir -p app/src/main/jniLibs
          mkdir -p app/libs
          
          # 创建 .keep 文件确保目录存在
          touch app/src/main/assets/models/.keep
          touch app/src/main/assets/subpack/.keep
          touch app/src/main/jniLibs/.keep
          
          # 注意：实际使用时需要配置以下 secrets
          # MODELS_URL, SUBPACK_URL, JNILIBS_URL, LIBS_URL
          # wget ${{ secrets.MODELS_URL }} -O models.zip
          # wget ${{ secrets.SUBPACK_URL }} -O subpack.zip
          # wget ${{ secrets.JNILIBS_URL }} -O jniLibs.zip
          # wget ${{ secrets.LIBS_URL }} -O libs.zip
          # unzip -q models.zip -d app/src/main/assets/models/
          # unzip -q subpack.zip -d app/src/main/assets/subpack/
          # unzip -q jniLibs.zip -d app/src/main/jniLibs/
          # unzip -q libs.zip -d app/libs/
      
      - name: Install npm dependencies
        run: npm install
      
      - name: Install web-chat dependencies
        run: npm --prefix web-chat install
      
      - name: Build web-chat
        run: npm run build:webchat
      
      - name: Sync example packages
        run: python3 ./sync_example_packages.py
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
      
      - name: Run Unit Tests
        run: ./gradlew test
        continue-on-error: true
      
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: app/build/reports/
