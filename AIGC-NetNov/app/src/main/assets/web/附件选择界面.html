<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>附件选择界面预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}

.phone-frame{width:393px;height:852px;background:#010102;border-radius:54px;border:3px solid #222325;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.7);flex-shrink:0}
.phone-screen{width:100%;height:100%;overflow:hidden;position:relative;background:#010102;display:flex;flex-direction:column}

/* Status Bar */
.status-bar{display:flex;justify-content:space-between;padding:14px 28px 6px;color:#f7f8f8;font-size:13px;font-weight:600;background:#010102}

/* Chat Messages Area */
.chat-msgs{flex:1;overflow-y:auto;padding:12px 16px}
.msg{display:flex;gap:8px;margin-bottom:12px}
.msg.user{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.msg-bb{max-width:82%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.55}
.msg.bot .msg-bb{background:#0f1011;color:#f7f8f8;border:1px solid #222325}
.msg.user .msg-bb{background:#5e6ad2;color:#fff}

/* Tools Bar */
.chat-tools{display:flex;gap:6px;padding:8px 16px;border-top:1px solid #222325;background:#010102;overflow-x:auto}
.chat-tools span{padding:6px 14px;border-radius:16px;background:#181a1f;color:#8b8d94;font-size:12px;cursor:pointer;white-space:nowrap;border:1px solid #222325;transition:all .15s;display:flex;align-items:center;gap:4px}
.chat-tools span:hover{background:#22252a}
.chat-tools span.active{background:#5e6ad220;color:#5e6ad2;border-color:#5e6ad2}

/* ===== Chat Input Area ===== */
.chat-input-area{background:#0a0a0b;border-top:1px solid #222325;padding:10px 16px 20px}

/* Attachment Button Row */
.attach-trigger-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.attach-btn{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:none;background:#1a1b1f}
.attach-btn:hover{background:#25262c}
.attach-btn.active{background:#5e6ad220;box-shadow:0 0 0 2px #5e6ad2}
.attach-btn svg{width:20px;height:20px;stroke:#8b8d94;stroke-width:2;fill:none}
.attach-btn.active svg{stroke:#5e6ad2}

/* Input Box */
.input-wrapper{flex:1;position:relative}
.input-box{width:100%;background:#141518;border:1px solid #2a2b2f;border-radius:24px;padding:12px 44px 12px 16px;color:#f7f8f8;font-size:14px;outline:none;transition:all .15s}
.input-box:focus{border-color:#5e6ad2;background:#1a1b1f}
.input-box::placeholder{color:#5c5e66}
.send-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:#5e6ad2;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:none}
.send-btn:hover{background:#4e5ab8}
.send-btn svg{width:16px;height:16px;fill:#fff}

/* ===== Attachment Panel ===== */
.attach-panel{background:#141518;border-top:1px solid #222325;border-radius:24px 24px 0 0;padding:20px;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

.attach-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.attach-title{color:#f7f8f8;font-size:15px;font-weight:600}
.attach-close{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#5c5e66;font-size:18px;transition:all .15s}
.attach-close:hover{background:#222325;color:#f7f8f8}

/* Attachment Grid */
.attach-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.attach-item{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border-radius:16px;cursor:pointer;transition:all .15s;background:#1a1b1f;border:1px solid transparent}
.attach-item:hover{background:#222325;border-color:#333}
.attach-item:active{transform:scale(0.96)}

.attach-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(135deg,#5e6ad2,#7b84e0);box-shadow:0 4px 12px rgba(94,106,210,.3)}
.attach-icon.img{background:linear-gradient(135deg,#5e6ad2,#7b84e0)}
.attach-icon.cam{background:linear-gradient(135deg,#4caf50,#81c784)}
.attach-icon.file{background:linear-gradient(135deg,#ff9800,#ffb74d)}
.attach-icon.audio{background:linear-gradient(135deg,#e91e63,#f48fb1)}
.attach-icon.loc{background:linear-gradient(135deg,#00bcd4,#80deea)}
.attach-icon.contact{background:linear-gradient(135deg,#9c27b0,#ce93d8)}
.attach-icon.scan{background:linear-gradient(135deg,#607d8b,#b0bec5)}
.attach-icon.note{background:linear-gradient(135deg,#795548,#bcaaa4)}

.attach-label{color:#f7f8f8;font-size:12px;font-weight:500}

/* Recent Files */
.recent-files{margin-top:8px}
.recent-title{color:#5c5e66;font-size:11px;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.recent-list{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.recent-item{min-width:80px;padding:10px;border-radius:12px;background:#1a1b1f;cursor:pointer;transition:all .15s;text-align:center}
.recent-item:hover{background:#222325}
.recent-thumb{width:100%;height:50px;border-radius:8px;background:#2a2b2f;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:20px}
.recent-name{color:#f7f8f8;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ===== Responsive ===== */
@media(max-width:420px){.phone-frame{width:100%;height:100vh;border-radius:0;border:none}}
</style>
</head>
<body>

<div class="phone-frame">
<div class="phone-screen">

  <!-- Status Bar -->
  <div class="status-bar"><span>10:38</span><span>📶 🔋 94%</span></div>

  <!-- Chat Messages -->
  <div class="chat-msgs">
    <div class="msg bot"><div class="msg-av" style="background:#5e6ad2;color:#fff">AI</div><div class="msg-bb">你好！我是你的 AI 写作助手。今天想写点什么？</div></div>
    <div class="msg user"><div class="msg-av" style="background:#7b84e0;color:#fff">U</div><div class="msg-bb">帮我看看这一段对话描写，感觉不太自然</div></div>
    <div class="msg bot"><div class="msg-av" style="background:#5e6ad2;color:#fff">AI</div><div class="msg-bb">好的，我分析了这段内容。建议从以下三个方面优化：人物对话的自然度、场景描写的层次感和节奏的松紧搭配。</div></div>
  </div>

  <!-- Tools Bar -->
  <div class="chat-tools">
    <span class="active">📝 润色</span>
    <span>✨ 续写</span>
    <span>📋 大纲</span>
    <span>🔍 分析</span>
  </div>

  <!-- Chat Input Area -->
  <div class="chat-input-area">
    <div class="attach-trigger-row">
      <!-- ▼ 附件按钮（高亮状态，表示已打开） -->
      <button class="attach-btn active" onclick="toggleAttachPanel()">
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <div class="input-wrapper">
        <input class="input-box" placeholder="输入消息...">
        <button class="send-btn">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>

    <!-- ===== Attachment Panel ===== -->
    <div class="attach-panel" id="attachPanel">
      <div class="attach-panel-header">
        <span class="attach-title">选择附件</span>
        <span class="attach-close" onclick="toggleAttachPanel()">✕</span>
      </div>
      
      <div class="attach-grid">
        <div class="attach-item" onclick="selectAttach('图片')">
          <div class="attach-icon img">🖼️</div>
          <span class="attach-label">图片</span>
        </div>
        <div class="attach-item" onclick="selectAttach('拍照')">
          <div class="attach-icon cam">📸</div>
          <span class="attach-label">拍照</span>
        </div>
        <div class="attach-item" onclick="selectAttach('文件')">
          <div class="attach-icon file">📄</div>
          <span class="attach-label">文件</span>
        </div>
        <div class="attach-item" onclick="selectAttach('音频')">
          <div class="attach-icon audio">🎵</div>
          <span class="attach-label">音频</span>
        </div>
        <div class="attach-item" onclick="selectAttach('位置')">
          <div class="attach-icon loc">📍</div>
          <span class="attach-label">位置</span>
        </div>
        <div class="attach-item" onclick="selectAttach('名片')">
          <div class="attach-icon contact">👤</div>
          <span class="attach-label">名片</span>
        </div>
        <div class="attach-item" onclick="selectAttach('扫一扫')">
          <div class="attach-icon scan">🔍</div>
          <span class="attach-label">扫一扫</span>
        </div>
        <div class="attach-item" onclick="selectAttach('笔记')">
          <div class="attach-icon note">📝</div>
          <span class="attach-label">笔记</span>
        </div>
      </div>

      <div class="recent-files">
        <div class="recent-title">最近文件</div>
        <div class="recent-list">
          <div class="recent-item" onclick="selectAttach('小说大纲.doc')">
            <div class="recent-thumb">📄</div>
            <div class="recent-name">小说大纲</div>
          </div>
          <div class="recent-item" onclick="selectAttach('角色设定.jpg')">
            <div class="recent-thumb">🖼️</div>
            <div class="recent-name">角色设定</div>
          </div>
          <div class="recent-item" onclick="selectAttach('第12章.txt')">
            <div class="recent-thumb">📝</div>
            <div class="recent-name">第12章</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
function toggleAttachPanel() {
  const panel = document.getElementById('attachPanel');
  const btn = document.querySelector('.attach-btn');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  btn.classList.toggle('active');
}

function selectAttach(name) {
  const input = document.querySelector('.input-box');
  input.value = `[已选择: ${name}]`;
  toggleAttachPanel();
}
</script>

</body>
</html>
