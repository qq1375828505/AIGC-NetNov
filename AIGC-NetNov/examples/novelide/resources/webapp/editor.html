<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写作编辑器</title>
<link rel="stylesheet" href="editor.css">
</head>
<body>
<!-- 顶部工具栏 -->
<div id="toolbar">
  <div class="toolbar-left">
    <button class="tool-btn" id="btn-back" title="返回">←</button>
    <span id="chapter-title">未选择章节</span>
  </div>
  <div class="toolbar-center">
    <button class="tool-btn" id="btn-bold" title="粗体 (Ctrl+B)"><b>B</b></button>
    <button class="tool-btn" id="btn-italic" title="斜体 (Ctrl+I)"><i>I</i></button>
    <button class="tool-btn" id="btn-underline" title="下划线 (Ctrl+U)"><u>U</u></button>
    <button class="tool-btn" id="btn-strike" title="删除线"><s>S</s></button>
    <span class="toolbar-divider"></span>
    <button class="tool-btn" id="btn-indent" title="首行缩进">¶</button>
    <button class="tool-btn" id="btn-clear" title="清除格式">⌀</button>
    <span class="toolbar-divider"></span>
    <button class="tool-btn" id="btn-undo" title="撤销 (Ctrl+Z)">↶</button>
    <button class="tool-btn" id="btn-redo" title="重做 (Ctrl+Y)">↷</button>
  </div>
  <div class="toolbar-right">
    <span id="save-status">就绪</span>
    <span id="word-count">0 字</span>
    <button class="tool-btn" id="btn-save" title="保存">💾</button>
  </div>
</div>

<!-- 编辑器主体 -->
<div id="editor-wrap">
  <div id="editor" contenteditable="true" spellcheck="false"></div>
</div>

<!-- 底部状态栏 -->
<div id="statusbar">
  <div class="status-left">
    <span id="cursor-pos">行 1 · 列 1</span>
  </div>
  <div class="status-center">
    <button class="status-btn" id="btn-ai-polish">✨ AI润色</button>
    <button class="status-btn" id="btn-ai-continue">✍️ AI续写</button>
    <button class="status-btn" id="btn-voice">🎤 语音输入</button>
  </div>
  <div class="status-right">
    <span id="auto-save-hint">自动保存已开启</span>
  </div>
</div>

<!-- 加载提示 -->
<div id="loading-overlay" class="hidden">
  <div class="loading-spinner"></div>
  <span>加载中...</span>
</div>

<script src="editor.js"></script>
</body>
</html>
